name: Build Homebrew Bottle

on:
  release:
    types: [published]

jobs:
  bottle:
    strategy:
      matrix:
        os: [macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap and install from source
        run: |
          brew tap quigs/tools "${{ github.workspace }}"
          brew install --build-bottle quigs/tools/piqley

      - name: Create bottle
        run: |
          cd ~
          brew bottle --json --root-url="https://github.com/josephquigley/piqley/releases/download/${{ github.event.release.tag_name }}" quigs/tools/piqley

      - name: Upload bottle to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ~
          gh release upload "${{ github.event.release.tag_name }}" piqley--*.tar.gz
          echo "Bottle uploaded. Update formula with the following JSON:"
          cat piqley--*.json
