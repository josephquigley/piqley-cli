excluded:
  - .build
  - Tests

disabled_rules:
  - trailing_comma          # Conflicts with SwiftFormat (adds trailing commas)
  - opening_brace           # Conflicts with SwiftFormat (Allman-style for multi-line conditions)
  - switch_case_alignment   # Conflicts with SwiftFormat (single-line switch)

line_length:
  warning: 150
  error: 200

identifier_name:
  min_length:
    warning: 3
    error: 2

nesting:
  type_level:
    warning: 2

function_body_length:
  warning: 150
  error: 350

file_length:
  warning: 500
  error: 1000

cyclomatic_complexity:
  warning: 25
  error: 50

type_body_length:
  warning: 400
  error: 800

large_tuple:
  warning: 3
  error: 4
